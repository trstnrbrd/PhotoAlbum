<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DuoSnap — {{ photo.description }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:             #f4f5f7;
      --surface:        #ffffff;
      --border:         #e2e5ea;
      --text-primary:   #1a1d23;
      --text-secondary: #7a8394;
      --accent:         #4a9e7f;
      --accent-soft:    #eaf5f0;
      --danger:         #e05252;
      --shadow-md:      0 6px 32px rgba(0,0,0,.10);
      --radius:         16px;
    }

    body {
      background: var(--bg);
      font-family: 'Poppins', sans-serif;
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      opacity: 0;
      animation: fadeDown .4s .05s forwards;
    }
    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
      color: var(--text-primary);
    }
    .brand-icon {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .brand-name { font-size: .9rem; font-weight: 600; }
    .brand-name span { color: var(--accent); }

    .topbar-actions { display: flex; gap: 8px; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 9px;
      font-family: inherit;
      font-size: .78rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: background .18s, transform .15s;
    }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .btn-ghost:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-soft); }
    .btn-danger {
      background: var(--danger);
      color: #fff;
      box-shadow: 0 2px 8px rgba(224,82,82,.2);
    }
    .btn-danger:hover { background: #c93a3a; transform: translateY(-1px); }

    .stage {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 44px 32px 60px;
      gap: 32px;
    }

    .photo-wrapper {
      max-width: 720px;
      width: 100%;
      opacity: 0;
      transform: scale(.97) translateY(14px);
      animation: zoomIn .5s .15s cubic-bezier(.25,.46,.45,.94) forwards;
    }

    .photo-frame {
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-md);
      line-height: 0;
      border: 1px solid var(--border);
    }
    .photo-frame img {
      width: 100%;
      max-height: 65vh;
      object-fit: contain;
      background: #eef0f3;
      display: block;
    }

    .photo-info {
      margin-top: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .info-left {}
    .info-uploader {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }
    .avatar {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: .6rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .avatar.partner { background: #6db89a; }
    .uploader-name { font-size: .78rem; font-weight: 500; color: var(--accent); }
    .photo-desc { font-size: .9rem; color: var(--text-primary); font-weight: 400; }
    .info-right { text-align: right; }
    .info-category {
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .09em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 3px;
    }
    .info-date { font-size: .78rem; color: var(--text-secondary); }

    @keyframes fadeDown { to { opacity: 1; } }
    @keyframes zoomIn { to { opacity: 1; transform: scale(1) translateY(0); } }

    @media (max-width: 640px) {
      .topbar { padding: 14px 18px; }
      .stage { padding: 28px 16px 40px; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <a href="{% url 'gallery' %}" class="topbar-brand">
      <div class="brand-icon">
        <svg width="14" height="14" viewBox="0 0 18 18" fill="none">
          <path d="M9 3.5C7 3.5 5.5 5 5.5 7S7 10.5 9 10.5 12.5 9 12.5 7 11 3.5 9 3.5Z" fill="white" opacity=".9"/>
          <path d="M3 14.5c0-2.5 2.7-4 6-4s6 1.5 6 4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="brand-name">Duo<span>Snap</span></div>
    </a>
    <div class="topbar-actions">
      <a href="{% url 'gallery' %}" class="btn btn-ghost">
        <svg width="12" height="12" viewBox="0 0 13 13" fill="none"><path d="M8 1L3 6.5 8 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Back
      </a>
      <a href="{% url 'delete' photo.id %}" class="btn btn-danger">
        <svg width="12" height="12" viewBox="0 0 13 13" fill="none"><path d="M2 3.5h9M5 3.5V2.5a1 1 0 012 0v1M5.5 6v4M7.5 6v4M3 3.5l.6 7a1 1 0 001 .9h3.8a1 1 0 001-.9l.6-7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Delete
      </a>
    </div>
  </header>

  <div class="stage">
    <div class="photo-wrapper">
      <div class="photo-frame">
        <img src="{{ photo.image.url }}" alt="{{ photo.description }}">
      </div>
      <div class="photo-info">
        <div class="info-left">
          <div class="info-uploader">
            <div class="avatar {% if photo.uploaded_by != request.user %}partner{% endif %}">
              {{ photo.uploaded_by.username|slice:":1"|default:"?" }}
            </div>
            <span class="uploader-name">{{ photo.uploaded_by.username|default:"Unknown" }}</span>
          </div>
          <div class="photo-desc">{{ photo.description }}</div>
        </div>
        <div class="info-right">
          <div class="info-category">{{ photo.category.name|default:"Uncategorized" }}</div>
          <div class="info-date">{{ photo.created_at|date:"F j, Y" }}</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const frame = document.querySelector('.photo-frame');
    const stage = document.querySelector('.stage');
    stage.addEventListener('mousemove', (e) => {
      const rect = frame.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = (e.clientX - cx) / rect.width;
      const dy = (e.clientY - cy) / rect.height;
      frame.style.transform = `perspective(900px) rotateY(${dx * 3}deg) rotateX(${-dy * 2.5}deg)`;
      frame.style.transition = 'transform .1s';
    });
    stage.addEventListener('mouseleave', () => {
      frame.style.transform = 'perspective(900px) rotateY(0) rotateX(0)';
      frame.style.transition = 'transform .5s ease';
    });
  </script>

</body>
</html>
