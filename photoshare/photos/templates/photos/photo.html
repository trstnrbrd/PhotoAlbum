<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DuoSnap — {{ photo.description }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f6f8; --surface: #ffffff; --border: #e2e6ea;
      --text: #111827; --muted: #6b7280; --dim: #9ca3af;
      --accent: #047857; --accent-dim: rgba(4,120,87,.08); --accent-glow: rgba(4,120,87,.2);
      --danger: #dc2626; --danger-dim: rgba(220,38,38,.08);
    }
    body {
      background: var(--bg); font-family: 'Poppins', sans-serif;
      color: var(--text); min-height: 100vh; display: flex; flex-direction: column;
    }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px; background: var(--surface);
      border-bottom: 1px solid var(--border);
      opacity: 0; animation: fadeDown .4s .04s forwards;
    }
    .topbar-brand { text-decoration: none; display: flex; align-items: center; }
    .brand-logo { height: 48px; width: auto; }
    .topbar-actions { display: flex; gap: 8px; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 16px; font-family: inherit; font-size: .72rem;
      font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
      cursor: pointer; text-decoration: none; border: 1px solid var(--border);
      transition: all .18s;
    }
    .btn-ghost { background: transparent; color: var(--muted); }
    .btn-ghost:hover { color: var(--accent); border-color: rgba(4,120,87,.3); background: var(--accent-dim); }
    .btn-danger { background: var(--danger-dim); color: var(--danger); border-color: rgba(220,38,38,.3); }
    .btn-danger:hover { background: rgba(220,38,38,.16); }

    .stage {
      flex: 1; display: flex; align-items: flex-start; justify-content: center;
      padding: 48px 32px 60px; gap: 32px;
    }
    .photo-wrapper {
      max-width: 800px; width: 100%;
      opacity: 0; transform: scale(.97) translateY(16px);
      animation: zoomIn .5s .1s cubic-bezier(.25,.46,.45,.94) forwards;
    }

    .photo-frame {
      position: relative; overflow: hidden; line-height: 0;
      border: 1px solid var(--border);
    }
    .photo-frame::before, .photo-frame::after {
      content: ''; position: absolute; width: 22px; height: 22px; z-index: 2;
    }
    .photo-frame::before { top: 10px; left: 10px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
    .photo-frame::after  { bottom: 10px; right: 10px; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }
    .photo-frame img {
      width: 100%; max-height: 68vh; object-fit: contain;
      background: var(--bg); display: block;
    }

    .photo-info {
      margin-top: 2px; background: var(--surface);
      border: 1px solid var(--border); border-top: none;
      padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
    }
    .info-left { display: flex; flex-direction: column; gap: 4px; }
    .info-uploader { display: flex; align-items: center; gap: 7px; }
    .avatar {
      width: 20px; height: 20px; background: var(--accent); color: #fff;
      font-size: .58rem; font-weight: 700; display: flex; align-items: center;
      justify-content: center; text-transform: uppercase; flex-shrink: 0;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }
    .avatar.partner { background: #94a3b8; color: #fff; }
    .uploader-name { font-size: .72rem; font-weight: 600; color: var(--accent); letter-spacing: .04em; text-transform: uppercase; }
    .photo-desc { font-size: .88rem; color: var(--text); }
    .info-right { text-align: right; }
    .info-category { font-size: .6rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--dim); margin-bottom: 3px; }
    .info-date { font-size: .72rem; color: var(--muted); }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--dim); }
    * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

    @keyframes fadeDown { to { opacity: 1; } }
    @keyframes zoomIn { to { opacity: 1; transform: scale(1) translateY(0); } }
  </style>
</head>
<body>
  <header class="topbar">
    <a href="{% url 'gallery' %}" class="topbar-brand">
      {% load static %}
      <img src="{% static 'images/duosnap logo.png' %}" alt="DuoSnap" class="brand-logo">
    </a>
    <div class="topbar-actions">
      <a href="{% url 'gallery' %}" class="btn btn-ghost">
        <svg width="11" height="11" viewBox="0 0 13 13" fill="none"><path d="M8 1L3 6.5 8 12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Back
      </a>
      <a href="{% url 'delete' photo.id %}" class="btn btn-danger">
        <svg width="11" height="11" viewBox="0 0 13 13" fill="none"><path d="M2 3.5h9M5 3.5V2.5a1 1 0 012 0v1M5.5 6v4M7.5 6v4M3 3.5l.6 7a1 1 0 001 .9h3.8a1 1 0 001-.9l.6-7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Delete
      </a>
    </div>
  </header>

  <div class="stage">
    <div class="photo-wrapper">
      <div class="photo-frame" id="frame">
        <img src="{{ photo.image.url }}" alt="{{ photo.description }}">
      </div>
      <div class="photo-info">
        <div class="info-left">
          <div class="info-uploader">
            <div class="avatar {% if photo.uploaded_by != request.user %}partner{% endif %}">
              {{ photo.uploaded_by.username|slice:":1"|default:"?" }}
            </div>
            <span class="uploader-name">{{ photo.uploaded_by.username|default:"Unknown" }}</span>
          </div>
          <div class="photo-desc">{{ photo.description }}</div>
        </div>
        <div class="info-right">
          <div class="info-category">{{ photo.category.name|default:"Uncategorized" }}</div>
          <div class="info-date">{{ photo.created_at|date:"F j, Y" }}</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const frame = document.getElementById('frame');
    const stage = document.querySelector('.stage');
    stage.addEventListener('mousemove', (e) => {
      const rect = frame.getBoundingClientRect();
      const dx = (e.clientX - rect.left - rect.width / 2) / rect.width;
      const dy = (e.clientY - rect.top - rect.height / 2) / rect.height;
      frame.style.transform = `perspective(1000px) rotateY(${dx * 4}deg) rotateX(${-dy * 3}deg)`;
      frame.style.transition = 'transform .1s';
    });
    stage.addEventListener('mouseleave', () => {
      frame.style.transform = 'perspective(1000px) rotateY(0) rotateX(0)';
      frame.style.transition = 'transform .6s ease';
    });
  </script>
</body>
</html>
