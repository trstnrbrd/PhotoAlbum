{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DuoSnap — Complete Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f6f8; --surface: #ffffff; --border: #e2e6ea;
      --text: #111827; --muted: #6b7280; --dim: #9ca3af;
      --accent: #047857; --accent-dim: rgba(4,120,87,.08); --accent-glow: rgba(4,120,87,.2);
      --danger: #dc2626;
    }
    body {
      background: var(--bg); font-family: 'Poppins', sans-serif; color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background-image: linear-gradient(rgba(4,120,87,.05) 1px, transparent 1px), linear-gradient(90deg, rgba(4,120,87,.05) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none;
    }
    .card {
      position: relative; z-index: 1;
      background: var(--surface); border: 1px solid var(--border);
      box-shadow: 0 8px 40px rgba(0,0,0,.08);
      width: 100%; max-width: 400px; padding: 40px 36px 36px;
      opacity: 0; transform: translateY(20px); animation: fadeUp .5s .08s forwards;
    }
    .card::before, .card::after { content: ''; position: absolute; width: 18px; height: 18px; }
    .card::before { top: -1px; left: -1px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
    .card::after  { bottom: -1px; right: -1px; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }

    .brand { display: flex; justify-content: center; margin-bottom: 28px; text-decoration: none; }
    .brand-logo { height: 80px; width: auto; }

    .back-link {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .68rem; color: var(--dim); text-decoration: none;
      margin-bottom: 20px; transition: color .18s; letter-spacing: .03em;
    }
    .back-link:hover { color: var(--accent); }

    .card-eyebrow {
      font-size: .6rem; font-weight: 600; letter-spacing: .16em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
    }
    .card-eyebrow::before { content: ''; width: 3px; height: 3px; background: var(--accent); clip-path: polygon(50% 0%, 100% 100%, 0% 100%); }
    .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; }
    .card-sub { font-size: .75rem; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }

    .error-msg {
      background: #fef2f2; border: 1px solid #fecaca;
      color: var(--danger); font-size: .75rem; padding: 10px 13px; margin-bottom: 18px;
      display: flex; align-items: center; gap: 7px;
    }

    .btn-submit {
      width: 100%; padding: 12px; background: var(--accent);
      color: #fff; border: none; font-family: inherit; font-size: .78rem;
      font-weight: 700; cursor: pointer; margin-top: 6px;
      letter-spacing: .08em; text-transform: uppercase;
      transition: background .18s, box-shadow .18s;
      box-shadow: 0 2px 16px var(--accent-glow);
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    }
    .btn-submit:hover { background: #065f46; box-shadow: 0 4px 20px rgba(4,120,87,.35); }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="card">
    <a href="/login/" class="brand">
      <img src="{% static 'images/duosnap logo.png' %}" alt="DuoSnap" class="brand-logo">
    </a>

    <a href="/login/" class="back-link">
      <svg width="11" height="11" viewBox="0 0 13 13" fill="none"><path d="M8 1L3 6.5 8 12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back to login
    </a>

    {% if form.errors %}
    <div class="error-msg">
      <svg width="12" height="12" viewBox="0 0 13 13" fill="none" style="flex-shrink:0"><circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.3"/><path d="M6.5 4v3M6.5 8.5v.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      Please fix the errors below.
    </div>
    {% endif %}

    <div class="card-eyebrow">Almost there</div>
    <div class="card-title">One last step</div>
    <div class="card-sub">Choose a username to complete your DuoSnap account.</div>

    <form method="POST" action="">
      {% csrf_token %}
      {{ form.as_p }}
      <div style="display:none">{{ form.as_hidden }}</div>
      <button type="submit" class="btn-submit">Enter DuoSnap</button>
    </form>
  </div>

  <script>
    document.querySelectorAll('form p').forEach(p => {
      const label = p.querySelector('label');
      const input = p.querySelector('input');
      const errors = p.querySelector('ul.errorlist');
      if (!input) return;
      const wrap = document.createElement('div');
      wrap.style.cssText = 'margin-bottom:16px;';
      if (label) {
        label.style.cssText = 'display:block;font-size:.6rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#4a5568;margin-bottom:7px;transition:color .18s';
        wrap.appendChild(label);
      }
      input.style.cssText = 'width:100%;padding:10px 13px;border:1px solid #1a2230;background:#080c10;font-family:inherit;font-size:.85rem;color:#e6edf3;outline:none';
      wrap.appendChild(input);
      if (errors) {
        errors.style.cssText = 'list-style:none;font-size:.7rem;color:#ff6b6b;margin-top:5px';
        wrap.appendChild(errors);
      }
      p.replaceWith(wrap);
      input.addEventListener('focus', () => {
        input.style.borderColor = '#00e676';
        input.style.boxShadow = '0 0 0 3px rgba(0,230,118,.08)';
        if (label) label.style.color = '#00e676';
      });
      input.addEventListener('blur', () => {
        input.style.borderColor = '#1a2230';
        input.style.boxShadow = '';
        if (label) label.style.color = '#4a5568';
      });
    });
  </script>
</body>
</html>
