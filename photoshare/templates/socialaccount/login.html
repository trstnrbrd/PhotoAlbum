<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DuoSnap — Sign in with Google</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f5f7; --surface: #ffffff; --border: #e2e5ea;
      --text-primary: #1a1d23; --text-secondary: #7a8394;
      --accent: #4a9e7f; --shadow-md: 0 8px 40px rgba(0,0,0,.10); --radius: 16px;
    }
    body {
      background: var(--bg); font-family: 'Poppins', sans-serif;
      color: var(--text-primary); min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow-md);
      width: 100%; max-width: 380px; padding: 44px 38px 38px;
      text-align: center;
      opacity: 0; transform: translateY(20px);
      animation: fadeUp .5s .08s forwards;
    }
    .brand { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 28px; }
    .brand-icon {
      width: 34px; height: 34px; background: var(--accent);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
    }
    .brand-name { font-size: 1.1rem; font-weight: 600; }
    .brand-name span { color: var(--accent); }
    .google-icon { margin: 0 auto 20px; opacity: .15; }
    .card-title { font-size: .95rem; font-weight: 600; margin-bottom: 6px; }
    .card-sub { font-size: .78rem; color: var(--text-secondary); margin-bottom: 28px; line-height: 1.6; }
    .btn-continue {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 12px 16px;
      background: var(--accent); color: #fff; border: none;
      border-radius: 10px; font-family: inherit; font-size: .875rem; font-weight: 500;
      cursor: pointer; text-decoration: none;
      transition: background .18s, transform .15s;
      box-shadow: 0 2px 12px rgba(74,158,127,.28);
    }
    .btn-continue:hover { background: #3a8a6c; transform: translateY(-1px); }
    form { width: 100%; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-icon">
        <svg width="17" height="17" viewBox="0 0 18 18" fill="none">
          <path d="M9 3.5C7 3.5 5.5 5 5.5 7S7 10.5 9 10.5 12.5 9 12.5 7 11 3.5 9 3.5Z" fill="white" opacity=".9"/>
          <path d="M3 14.5c0-2.5 2.7-4 6-4s6 1.5 6 4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="brand-name">Duo<span>Snap</span></div>
    </div>

    <svg class="google-icon" width="40" height="40" viewBox="0 0 18 18" fill="none">
      <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z" fill="#4285F4"/>
      <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z" fill="#34A853"/>
      <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z" fill="#FBBC05"/>
      <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58Z" fill="#EA4335"/>
    </svg>

    <div class="card-title">Sign in via Google</div>
    <div class="card-sub">You're about to sign in to DuoSnap using your Google account.</div>

    <form method="post" action="">
      {% csrf_token %}
      <button type="submit" class="btn-continue">
        <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z" fill="white"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z" fill="white"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z" fill="white"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58Z" fill="white"/>
        </svg>
        Continue with Google
      </button>
    </form>
  </div>
</body>
</html>
