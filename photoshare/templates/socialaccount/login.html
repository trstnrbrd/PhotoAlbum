{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DuoSnap — Sign in with Google</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f6f8; --surface: #ffffff; --border: #e2e6ea;
      --text: #111827; --muted: #6b7280; --dim: #9ca3af;
      --accent: #047857; --accent-dim: rgba(4,120,87,.08); --accent-glow: rgba(4,120,87,.2);
    }
    body {
      background: var(--bg); font-family: 'Poppins', sans-serif; color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background-image: linear-gradient(rgba(4,120,87,.05) 1px, transparent 1px), linear-gradient(90deg, rgba(4,120,87,.05) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none;
    }
    .card {
      position: relative; z-index: 1;
      background: var(--surface); border: 1px solid var(--border);
      box-shadow: 0 8px 40px rgba(0,0,0,.08);
      width: 100%; max-width: 380px; padding: 40px 36px 36px; text-align: center;
      opacity: 0; transform: translateY(20px); animation: fadeUp .5s .08s forwards;
    }
    .card::before, .card::after { content: ''; position: absolute; width: 18px; height: 18px; }
    .card::before { top: -1px; left: -1px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
    .card::after  { bottom: -1px; right: -1px; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }

    .brand { display: flex; justify-content: center; margin-bottom: 28px; text-decoration: none; }
    .brand-logo { height: 80px; width: auto; }

    .card-eyebrow {
      font-size: .6rem; font-weight: 600; letter-spacing: .16em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .card-eyebrow::before { content: ''; width: 3px; height: 3px; background: var(--accent); clip-path: polygon(50% 0%, 100% 100%, 0% 100%); }
    .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 6px; }
    .card-sub { font-size: .75rem; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }

    form { width: 100%; }
    .btn-continue {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 12px 16px; background: var(--accent);
      color: #fff; border: none; font-family: inherit; font-size: .78rem;
      font-weight: 700; cursor: pointer; text-decoration: none;
      letter-spacing: .08em; text-transform: uppercase;
      transition: background .18s, box-shadow .18s;
      box-shadow: 0 2px 16px var(--accent-glow);
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    }
    .btn-continue:hover { background: #065f46; box-shadow: 0 4px 20px rgba(4,120,87,.35); }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="card">
    <a href="/login/" class="brand">
      <img src="{% static 'images/duosnap logo.png' %}" alt="DuoSnap" class="brand-logo">
    </a>
    <div class="card-eyebrow">Google Auth</div>
    <div class="card-title">Sign in via Google</div>
    <div class="card-sub">You're about to sign in to DuoSnap using your Google account.</div>
    <form method="post" action="">
      {% csrf_token %}
      <button type="submit" class="btn-continue">
        <svg width="15" height="15" viewBox="0 0 18 18" fill="none">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z" fill="rgba(255,255,255,.8)"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z" fill="rgba(255,255,255,.8)"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z" fill="rgba(255,255,255,.8)"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58Z" fill="rgba(255,255,255,.8)"/>
        </svg>
        Continue with Google
      </button>
    </form>
  </div>
</body>
</html>
