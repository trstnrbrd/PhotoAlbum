{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DuoSnap — Password Changed</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f6f8; --surface: #ffffff; --border: #e2e6ea;
      --text: #111827; --muted: #6b7280; --dim: #9ca3af;
      --accent: #047857; --accent-dim: rgba(4,120,87,.08); --accent-glow: rgba(4,120,87,.2);
    }
    body {
      background: var(--bg); font-family: 'Poppins', sans-serif;
      color: var(--text); min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(4,120,87,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(4,120,87,.05) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .card {
      position: relative; z-index: 1;
      background: var(--surface); border: 1px solid var(--border);
      box-shadow: 0 8px 40px rgba(0,0,0,.08);
      width: 100%; max-width: 400px; padding: 40px 36px 36px;
      text-align: center;
      opacity: 0; transform: translateY(20px); animation: fadeUp .5s .08s forwards;
    }
    .card::before, .card::after {
      content: ''; position: absolute; width: 18px; height: 18px;
    }
    .card::before { top: -1px; left: -1px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
    .card::after  { bottom: -1px; right: -1px; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }

    .brand { display: flex; justify-content: center; margin-bottom: 28px; text-decoration: none; }
    .brand-logo { height: 80px; width: auto; }

    .icon-wrap {
      display: flex; align-items: center; justify-content: center;
      width: 56px; height: 56px; border: 1px solid var(--border);
      margin: 0 auto 20px; color: var(--accent);
    }

    .card-eyebrow {
      font-size: .6rem; font-weight: 600; letter-spacing: .16em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 6px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .card-eyebrow::before { content: ''; width: 3px; height: 3px; background: var(--accent); clip-path: polygon(50% 0%, 100% 100%, 0% 100%); }
    .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; }
    .card-sub { font-size: .78rem; color: var(--muted); margin-bottom: 28px; line-height: 1.7; }

    .btn-login {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 12px 24px; background: var(--accent);
      color: #fff; text-decoration: none; font-family: inherit; font-size: .78rem;
      font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      transition: background .18s, box-shadow .18s;
      box-shadow: 0 2px 16px var(--accent-glow);
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    }
    .btn-login:hover { background: #065f46; box-shadow: 0 4px 20px rgba(4,120,87,.35); }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="card">
    <a href="/login/" class="brand">
      <img src="{% static 'images/duosnap logo.png' %}" alt="DuoSnap" class="brand-logo">
    </a>

    <div class="icon-wrap">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>

    <div class="card-eyebrow">Success</div>
    <div class="card-title">Password changed</div>
    <div class="card-sub">Your password has been updated. You can now sign in with your new password.</div>

    <a href="/login/" class="btn-login">Sign in</a>
  </div>
</body>
</html>
